<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Photos by Jim | Portfolio</title>
        <link 
            href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400&family=Playfair+Display:wght@400;700&display=swap" 
            rel="stylesheet"
        >
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <nav class="navbar">
            <div class="nav-container">
                <div class="logo">PHOTOS BY JIM</div>
                <ul class="nav-links">
                    <li><a href="#">Home</a></li>
                    <li><a href="#gallery">Gallery</a></li>
                    <li><a href="#">Services</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </div>
        </nav>
        <header class="hero">
            <div class="hero-content">
                <h1>Photos by Jim</h1>
                <a href="#gallery" class="cta-button">View Gallery</a>
            </div>
        </header>
        <main class="container">
            <section id="gallery" class="gallery-layout">
                <div class="gallery-grid">
                    <img src="images/gallery-work/urban-1a4h3.jpg"alt="Work 1">
                    <img src="images/gallery-work/urban-2b3sc.jpg"alt="Work 2">
                    <img src="images/gallery-work/urban-3u8sv.jpg"alt="Work 3">
                    <img src="images/gallery-work/urban-9mb73.jpg"alt="Work 9">
                    <img src="images/gallery-work/urban-10bn7.jpg"alt="Work 10">
                    <img src="images/gallery-work/urban-11n8m.jpg"alt="Work 11">
                    <img src="images/gallery-work/urban-15r57.jpg"alt="Work 15">
                    <img src="images/gallery-work/urban-16ij4.jpg"alt="Work 16">
                    <img src="images/gallery-work/urban-17c5x.jpg"alt="Work 17">
                </div>
            </section>
            <section class="info-cards-section">
                <div class="card">
                    <h3>About</h3>
                    <a href="#" class="card-cta">Learn More</a>
                </div>
                <div class="card">
                    <h3>Services</h3>
                    <a href="#" class="card-cta">View Rates</a>
                </div> 
                <div class="card">
                    <h3>Contact</h3>
                    <a href="#" class="card-cta">Reach Out</a>
                </div>
            </section>
        </main>
    </body>
</html>
