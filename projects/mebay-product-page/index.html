<!DOCTYPE html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link href="css/style.css" rel="stylesheet">
    </head>
    <body>
        <header id="main-header">
            <div class="logo">
                <span class="m">m</span>
                <span class="e">e</span>
                <span class="b">b</span>
                <span class="a">a</span>
                <span class="y">y</span>
            </div>
        </header>
        <div id="layout">
            <div id="thumbnail-column">
                <div class="thumb"><img src="images/porsche1.jpg" alt="1"></div>
                <div class="thumb"><img src="images/porsche2.jpg"alt="2"></div>
                <div class="thumb"><img src="images/porsche3.jpg"alt="3"></div>
                <div class="thumb"><img src="images/porsche4.jpg"alt="4"></div>
                <div class="thumb"><img src="images/porsche5.jpg"alt="5"></div>
            </div>
            <div id="featured-image-column">
                <img src="images/porsche1.jpg" alt="Porsche 911" class="main-img">
            </div>
            <div id="product-info-column">
                <p class="trust-badge"> Secure Purchase</p>
                <h1>2018 Porsche 911 CARRERA</h1>
                <p>2018 Porsche 911 CARRERA T</p>
                <div class="seller-card">
                    <div class="avatar">M</div>
                    <div class="seller-details">
                        <b>Manuela Ospina</b>
                        <p>100% positive feedback</p>
                    </div>
                </div>
                <div class="price-section">
                    <span class="currency">US</span>
                    <span class="amount">$89,990.00</span>
                    <span class="bid-text">or Best Offer</span>
                </div>
                <div class="button-group">
                    <button class="btn btn-blue">Buy It Now</button>
                    <button class="btn btn-white">Make offer</button>
                    <button class="btn btn-white">♡ Add to Watchlist</button>
                </div>
                <div class="meta-data">
                    <p><b>Condition:</b> Used</p>
                </div>
            </div>
        </div>   
    </body>
</html>
